name: Bug Report
description: Report a bug in jFairy
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: jFairy version
      placeholder: "0.8.0"
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "17"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal code to reproduce the issue
      render: java
